<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" width="1100" height="340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="30%" stop-color="#8b5cf6"/>
      <stop offset="60%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hex" width="30" height="52" patternUnits="userSpaceOnUse">
      <path d="M15 0 L30 8.7 L30 26 L15 34.7 L0 26 L0 8.7 Z" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1a1a1a"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="340" rx="0" fill="url(#bg)"/>

  <!-- Hex pattern overlay -->
  <rect width="1100" height="340" fill="url(#hex)" opacity="0.3"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="250" r="160" fill="#3b82f6" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="550" cy="80" r="180" fill="#8b5cf6" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="900" cy="250" r="160" fill="#ec4899" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1100" height="2" fill="url(#accent1)"/>

  <!-- Logo mark -->
  <g>
    <rect x="50" y="60" width="56" height="56" rx="14" fill="none" stroke="url(#accent1)" stroke-width="2.5"/>
    <rect x="54" y="64" width="48" height="48" rx="10" fill="url(#accent1)" opacity="0.1"/>
    <text x="78" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="url(#accent1)">K</text>
    <!-- Small decorative lines -->
    <rect x="50" y="126" width="56" height="2" rx="1" fill="url(#accent2)" opacity="0.5"/>
    <rect x="50" y="133" width="40" height="2" rx="1" fill="url(#accent2)" opacity="0.3"/>
    <rect x="50" y="140" width="22" height="2" rx="1" fill="url(#accent2)" opacity="0.15"/>
  </g>

  <!-- Title block -->
  <text x="135" y="82" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="2">KairosOS</text>
  <text x="137" y="111" font-family="monospace" font-size="14" fill="#525252" letter-spacing="3">AUTONOMOUS OPERATING SYSTEM</text>
  <text x="137" y="140" font-family="system-ui, sans-serif" font-size="13" fill="#737373" letter-spacing="0.5">Production-hardened · Self-healing · OTA-updatable · 24k+ LOC</text>

  <!-- Divider line -->
  <line x1="50" y1="160" x2="1050" y2="160" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Stats section -->
  <g>
    <!-- Rust -->
    <rect x="50" y="180" width="145" height="70" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
    <rect x="50" y="180" width="145" height="3" rx="1.5" fill="#8b5cf6"/>
    <circle cx="75" cy="208" r="10" fill="#2e1065"/>
    <text x="75" y="213" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#a78bfa">R</text>
    <text x="93" y="208" font-family="system-ui" font-size="20" font-weight="800" fill="#ffffff">20</text>
    <text x="93" y="226" font-family="system-ui" font-size="10" fill="#737373">Rust Daemons</text>
    <text x="93" y="240" font-family="monospace" font-size="8" fill="#404040">src/kairos-* (277 files)</text>

    <!-- Python -->
    <rect x="212" y="180" width="145" height="70" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
    <rect x="212" y="180" width="145" height="3" rx="1.5" fill="#ec4899"/>
    <circle cx="237" cy="208" r="10" fill="#4c0519"/>
    <text x="237" y="213" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#f472b6">P</text>
    <text x="255" y="208" font-family="system-ui" font-size="20" font-weight="800" fill="#ffffff">8</text>
    <text x="255" y="226" font-family="system-ui" font-size="10" fill="#737373">AI Microservices</text>
    <text x="255" y="240" font-family="monospace" font-size="8" fill="#404040">ai/* (74 files)</text>

    <!-- Kernel -->
    <rect x="374" y="180" width="145" height="70" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
    <rect x="374" y="180" width="145" height="3" rx="1.5" fill="#10b981"/>
    <circle cx="399" cy="208" r="10" fill="#022c22"/>
    <text x="399" y="213" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#34d399">C</text>
    <text x="417" y="208" font-family="system-ui" font-size="20" font-weight="800" fill="#ffffff">7</text>
    <text x="417" y="226" font-family="system-ui" font-size="10" fill="#737373">Kernel Modules</text>
    <text x="417" y="240" font-family="monospace" font-size="8" fill="#404040">kernel/*/ (13 files)</text>

    <!-- AppArmor -->
    <rect x="536" y="180" width="145" height="70" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
    <rect x="536" y="180" width="145" height="3" rx="1.5" fill="#f59e0b"/>
    <circle cx="561" cy="208" r="10" fill="#422006"/>
    <text x="561" y="213" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#fbbf24">A</text>
    <text x="579" y="208" font-family="system-ui" font-size="20" font-weight="800" fill="#ffffff">22</text>
    <text x="579" y="226" font-family="system-ui" font-size="10" fill="#737373">AppArmor Profiles</text>
    <text x="579" y="240" font-family="monospace" font-size="8" fill="#404040">daemon-specific</text>

    <!-- Scripts -->
    <rect x="698" y="180" width="145" height="70" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
    <rect x="698" y="180" width="145" height="3" rx="1.5" fill="#3b82f6"/>
    <circle cx="723" cy="208" r="10" fill="#1e3a5f"/>
    <text x="723" y="213" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#60a5fa">sh</text>
    <text x="741" y="208" font-family="system-ui" font-size="20" font-weight="800" fill="#ffffff">74</text>
    <text x="741" y="226" font-family="system-ui" font-size="10" fill="#737373">Shell Scripts</text>
    <text x="741" y="240" font-family="monospace" font-size="8" fill="#404040">scripts/ (77 files)</text>

    <!-- Systemd -->
    <rect x="860" y="180" width="145" height="70" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
    <rect x="860" y="180" width="145" height="3" rx="1.5" fill="#06b6d4"/>
    <circle cx="885" cy="208" r="10" fill="#164e63"/>
    <text x="885" y="213" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="700" fill="#22d3ee">S</text>
    <text x="903" y="208" font-family="system-ui" font-size="20" font-weight="800" fill="#ffffff">35</text>
    <text x="903" y="226" font-family="system-ui" font-size="10" fill="#737373">Systemd Units</text>
    <text x="903" y="240" font-family="monospace" font-size="8" fill="#404040">config/systemd/</text>
  </g>

  <!-- Bottom decorative section -->
  <rect x="50" y="270" width="1000" height="50" rx="8" fill="#141414" stroke="#1f1f1f" stroke-width="1"/>
  <rect x="50" y="270" width="1000" height="1" fill="#1f1f1f"/>

  <!-- Tech stack tags -->
  <rect x="70" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="115" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">Rust 2021</text>

  <rect x="175" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="220" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">Python 3.12</text>

  <rect x="280" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="325" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">Kernel 6.x</text>

  <rect x="385" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="430" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">Tokio Async</text>

  <rect x="490" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="535" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">Systemd</text>

  <rect x="595" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="640" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">AppArmor</text>

  <rect x="700" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="745" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">DM-Verity</text>

  <rect x="805" y="283" width="90" height="24" rx="4" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="850" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3a3a3">GitHub CI</text>

  <!-- Bottom accent line -->
  <rect x="0" y="338" width="1100" height="2" fill="url(#accent2)"/>
</svg>
